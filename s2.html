<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Hubby!</title>
    <style>
        body {
            text-align: center;
            background: radial-gradient(circle at top, #ffecd2, #fcb69f);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 50px 20px;
            color: #4a2c3a;
            max-width: 700px;
            margin: auto;
            overflow: hidden;
            position: relative;
        }

        h1 {
            background: linear-gradient(90deg, #ff4081, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 56px;
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 1px 2px 5px rgba(233, 30, 99, 0.4);
            animation: fadeInDown 1s ease forwards;
        }

        p.message {
            font-size: 26px;
            font-style: italic;
            color: #6b425b;
            margin-bottom: 40px;
            border-bottom: 2px solid #e91e63;
            display: inline-block;
            padding-bottom: 8px;
            position: relative;
            user-select: none;
            animation: fadeInUp 1s ease 0.5s forwards;
            opacity: 0;
        }

        p.message::after {
            content: " ❤️";
            display: inline-block;
            animation: pulseHeart 1.5s infinite;
            font-size: 28px;
            position: relative;
            top: 2px;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .quotes {
            max-width: 500px;
            margin: auto;
            font-style: italic;
            letter-spacing: 0.03em;
        }

        .quotes p {
            font-size: 20px;
            margin: 20px 0;
            color: #5a3b50;
            position: relative;
            line-height: 1.4;
            transition: color 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards;
        }

        .quotes p:nth-child(1) { animation-delay: 0.6s; }
        .quotes p:nth-child(2) { animation-delay: 0.8s; }
        .quotes p:nth-child(3) { animation-delay: 1s; }
        .quotes p:nth-child(4) { animation-delay: 1.2s; }
        .quotes p:nth-child(5) { animation-delay: 1.4s; }

        .quotes p:nth-child(odd) { color: #7b4e68; }
        .quotes p:nth-child(even) { color: #a16a85; }
        .quotes p + p::before {
            content: "❦";
            color: #d46a81;
            display: block;
            font-size: 18px;
            margin: 10px auto;
            user-select: none;
        }

        button {
            padding: 16px 36px;
            font-size: 22px;
            background: linear-gradient(45deg, #ff4081, #e91e63);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(233, 30, 99, 0.5), inset 0 -3px 6px rgba(255, 64, 129, 0.7);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            font-weight: 600;
            letter-spacing: 1.1px;
            user-select: none;
            animation: fadeInUp 1s ease 2s forwards;
            opacity: 0;
        }

        button:hover, button:focus {
            transform: scale(1.12);
            box-shadow: 0 9px 20px rgba(233, 30, 99, 0.7), inset 0 -3px 6px rgba(255, 64, 129, 0.9);
            outline: none;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 9999;
        }
        .confetti div {
            position: absolute;
            width: 10px; height: 10px;
            opacity: 0.8;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        /* Fade in and up animation */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: #ff4081;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-50px) scale(1); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="confetti" id="confetti"></div>

    <!-- Floating hearts -->
    <div class="heart" style="left:10%;">❤️</div>
    <div class="heart" style="left:25%; animation-delay:1s;">💖</div>
    <div class="heart" style="left:40%; animation-delay:2s;">💗</div>
    <div class="heart" style="left:60%; animation-delay:1.5s;">❤️</div>
    <div class="heart" style="left:75%; animation-delay:2.5s;">💖</div>
    <div class="heart" style="left:90%; animation-delay:3s;">💗</div>

    <h1>🎉To My Wonderful Partner,
HAPPY BIRTHDAY! 💖</h1>

   

    <div class="quotes">
        <p>"Your presence illuminates my world, Another Year older,"</p>
        <p>"Another year more Beautiful, Inside and Out."</p>
        <p>"I cherish you deeply."</p>
       
    </div>

    <br>
   <button onclick="window.location.href='s3.html'">DISCOVER MORE</button>

    <script>
        function showMessage() {
            alert("This button can take you to a special birthday surprise!");
        }

        // Generate colorful confetti
        const confettiContainer = document.getElementById('confetti');
        for(let i = 0; i < 120; i++) {
            const confetti = document.createElement('div');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
            confetti.style.animationDuration = (2 + Math.random()*3) + 's';
            confettiContainer.appendChild(confetti);
        }
    </script>

</body>
</html>
